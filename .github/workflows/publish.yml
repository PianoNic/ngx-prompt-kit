name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm --version

      - run: bun install --frozen-lockfile

      - run: bun run build:lib

      - run: npm publish
        working-directory: dist/ngx-prompt-kit
        env:
          NODE_AUTH_TOKEN: ""
