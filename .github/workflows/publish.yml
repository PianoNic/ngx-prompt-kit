name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync lib version with release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PKG="src/library/package.json"
          CURRENT=$(node -p "require('./$PKG').version")
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "Lib version already $VERSION, no bump needed."
          else
            echo "Bumping $PKG from $CURRENT to $VERSION"
            node -e "const fs=require('fs');const f='$PKG';const p=JSON.parse(fs.readFileSync(f));p.version='$VERSION';fs.writeFileSync(f, JSON.stringify(p, null, 2) + '\n');"
            OWNER="${{ github.repository_owner }}"
            OWNER_ID=$(gh api "users/$OWNER" --jq '.id')
            git config user.name "$OWNER"
            git config user.email "${OWNER_ID}+${OWNER}@users.noreply.github.com"
            git add "$PKG"
            git commit -m "bump ngx-prompt-kit to $VERSION"
            git push origin master
          fi

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm --version

      - run: bun install --frozen-lockfile

      - run: bun run build:lib

      - run: npm publish
        working-directory: dist/ngx-prompt-kit
        env:
          NODE_AUTH_TOKEN: ""
