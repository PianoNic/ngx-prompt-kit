                            - paragraph [ref=f7e26]: "This creates a grid where:"
                            - list [ref=f7e27]:
                              - listitem [ref=f7e28]: Columns automatically fit as many as possible
                              - listitem [ref=f7e29]: Each column is at least 250px wide
                              - listitem [ref=f7e30]: Columns expand to fill available space
