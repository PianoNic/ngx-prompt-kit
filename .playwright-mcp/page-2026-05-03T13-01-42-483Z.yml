            - heading "What is a chat UI?" [level=2] [ref=e42]
            - generic [ref=e43]:
              - paragraph [ref=e44]: A chat UI is the interface layer for conversations, regardless of model or provider. It includes a conversation layout, a message list with roles, and a message renderer that keeps long threads readable. Common building blocks are avatars, timestamps, message grouping, and a history panel for navigation.
              - paragraph [ref=e45]: The goal is clarity and continuity. A solid chat UI defines spacing, alignment, and affordances so users can scan messages quickly and understand context. It also includes input patterns that support multi-line prompts and consistent keyboard behavior.
              - paragraph [ref=e46]: "This page focuses on chat UI layout patterns and components that are model-agnostic: message lists, avatars, chat history, and conversation shells. Use these building blocks to assemble a chat interface that can plug into any backend or SDK."
