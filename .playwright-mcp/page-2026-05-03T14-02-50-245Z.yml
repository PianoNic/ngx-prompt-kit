          - paragraph [ref=e62]: Get prompt-kit-ng wired into an Angular workspace. Components are distributed via schematics — the source lands in your project where you own it.
        - generic [ref=e63]:
          - heading "Prerequisites" [level=2] [ref=e64]
          - paragraph [ref=e65]: "Before installing, make sure you have:"
          - list [ref=e66]:
            - listitem [ref=e67]:
              - link "Node.js" [ref=e68] [cursor=pointer]:
                - /url: https://nodejs.org
              - text: 22 or later
            - listitem [ref=e69]:
              - link "Angular" [ref=e70] [cursor=pointer]:
                - /url: https://angular.dev
              - text: 19 or later (tested on 21)
            - listitem [ref=e71]:
              - link "Tailwind CSS" [ref=e72] [cursor=pointer]:
                - /url: https://tailwindcss.com
              - text: v4
        - generic [ref=e73]:
          - heading "Install Spartan UI" [level=2] [ref=e74]
          - paragraph [ref=e75]: "prompt-kit-ng composes Spartan UI helm primitives. Install and initialize Spartan in your workspace first:"
          - code [ref=e81]: bun add -d @spartan-ng/cli ng g @spartan-ng/cli:init ng g @spartan-ng/cli:ui
          - paragraph [ref=e82]:
            - text: "When prompted, select at minimum these helm components:"
            - code [ref=e83]: avatar
            - text: ","
            - code [ref=e84]: button
            - text: ","
            - code [ref=e85]: textarea
            - text: ","
            - code [ref=e86]: tooltip
            - text: .
        - generic [ref=e87]:
          - heading "Add prompt-kit-ng" [level=2] [ref=e88]
          - paragraph [ref=e89]:
            - text: One-time bootstrap. Patches the universal runtime deps (
            - code [ref=e90]: clsx
            - text: ","
            - code [ref=e91]: tailwind-merge
            - text: ) and warns if Spartan isn't detected.
          - code [ref=e97]: ng add @pianonic/prompt-kit-ng
        - generic [ref=e98]:
          - heading "Add components" [level=2] [ref=e99]
          - paragraph [ref=e100]:
            - text: Generate any component into your project. The
            - code [ref=e101]: cn()
            - text: utility lands alongside automatically. Component-specific deps (e.g.
            - code [ref=e102]: marked
            - text: for markdown,
            - code [ref=e103]: shiki
            - text: for code-block) are added to your
            - code [ref=e104]: package.json
            - text: when needed.
          - code [ref=e110]: "ng generate @pianonic/prompt-kit-ng:message ng generate @pianonic/prompt-kit-ng:prompt-input ng generate @pianonic/prompt-kit-ng:markdown # ...etc."
          - paragraph [ref=e111]:
            - text: Components land at
